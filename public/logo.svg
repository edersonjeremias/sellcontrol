<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#021a2e"/>
      <stop offset="100%" stop-color="#010810"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Outer glow halo -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#1ae0ff" stroke-width="1" opacity="0.25" filter="url(#glow2)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#1ae0ff" stroke-width="1.2" opacity="0.6"/>

  <!-- Inner ring (brighter) -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#1ae0ff" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Arrow line: bottom-left → dip → peak → arrowhead upper-right -->
  <!-- Points: (18,72) → (30,55) → (38,63) → (52,35) → (70,18) -->
  <polyline
    points="18,72 30,55 38,63 52,35 70,18"
    fill="none"
    stroke="#1ae0ff"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Arrowhead -->
  <polyline
    points="55,18 70,18 70,33"
    fill="none"
    stroke="#1ae0ff"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
