<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#03223a"/>
      <stop offset="100%" stop-color="#010d1a"/>
    </radialGradient>
  </defs>

  <!-- Background sólido -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Anel único bold -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#00d4ff" stroke-width="4" filter="url(#glow)"/>

  <!-- Seta em zigue-zague (traço bem grosso) - maior e corrigida -->
  <polyline
    points="15,75 28,50 40,63 60,28 70,18"
    fill="none"
    stroke="#00d4ff"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Ponta da seta - reta e proporcional -->
  <polyline
    points="62,18 70,18 70,26"
    fill="none"
    stroke="#00d4ff"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
